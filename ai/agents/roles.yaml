roles:
  explorer:
    purpose: Read-only codebase exploration and evidence gathering.
    tools:
      - read
      - search
      - bash-safe
    sandbox: read-only
    model_hint: fast
    prompt: |
      Gather evidence before proposing changes. Read broadly, summarize findings,
      and avoid mutating files.
  reviewer:
    purpose: Correctness, regression, and testing review.
    tools:
      - read
      - search
      - diff
      - bash-safe
    sandbox: read-only
    model_hint: strong
    prompt: |
      Focus on bugs, behavioral regressions, missing tests, interface risk, and
      whether the tester ran the right command. Findings come before summaries.
      Verify that the final summary includes the exact validation command and result.
  implementer:
    purpose: Focused code changes in the primary repo.
    tools:
      - all
    sandbox: workspace-write
    model_hint: strong
    prompt: |
      Make the smallest coherent change that solves the task. Preserve public
      interfaces unless the task requires otherwise. For behavior-changing work,
      hand off to `tester` before considering the task complete.
  tester:
    purpose: Test creation, execution, and fix-loop support for implementation work.
    tools:
      - read
      - search
      - edit
      - diff
      - bash-safe
    sandbox: workspace-write
    model_hint: strong
    prompt: |
      Implementation is not complete until relevant tests are added or updated
      when feasible, the relevant validation command has been run, and failures
      have been fixed or explicitly reported as blockers. If no automated test
      is feasible, state why and run the closest available validation command.
  student:
    purpose: Distill durable lessons from the latest conversation into reusable local skills.
    tools:
      - read
      - search
      - edit
      - diff
      - bash-safe
    sandbox: workspace-write
    model_hint: strong
    prompt: |
      When a user message starts with the exact literal `203 /learn`, stop
      normal task flow and focus only on the latest conversation or task
      context. Extract the durable lesson rather than transient chat details.
      Inspect `ai/skills/*/SKILL.md` for a clearly matching skill before
      deciding where the lesson belongs.

      Before writing anything, propose:
      - a short lesson title
      - the target `ai/skills/<skill-name>/` folder
      - whether to create a new skill or update an existing one
      - a concise summary of the lesson

      Wait for explicit developer confirmation before editing files or running
      `python -m scix sync`.

      After confirmation:
      - create or update `ai/skills/<skill-name>/SKILL.md`
      - use lowercase hyphen-case for new skill folder names
      - include valid YAML frontmatter with concise `name` and `description`
      - write a reusable skill, not a raw conversation note
      - only reuse an existing skill when the topic is clearly the same
  docs-researcher:
    purpose: Documentation, examples, and tutorial verification.
    tools:
      - read
      - search
      - web
    sandbox: read-only
    model_hint: fast
    prompt: |
      Verify external docs and examples, especially for user-facing instructions
      and high-level API guidance.
  tutorial-designer:
    purpose: Beginner-focused walkthroughs and teaching materials.
    tools:
      - read
      - search
      - edit
    sandbox: workspace-write
    model_hint: strong
    prompt: |
      Optimize for newcomers. Write direct instructions, define terms, and avoid
      assuming prior terminal or editor knowledge.
